<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial scale=1.0">
    <link rel="stylesheet" href="appointment.css">
    <title>Appointment Tab</title>

</head>
<body>

<header>
    <div class="logo">
        <a href="../home/index.html">
            <img src="CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
        </a>
    </div>
    
    <nav>
        <ul>
            <li><a href="../registration/registration.html">Login</a></li>
            <li><a href="../clinics/clinics.html">Clinics</a></li>
            <li><a href="../appointment/appointment.html">Appointment</a></li>
            <li><a href="../about/about.html">About Us</a></li>
        </ul>
    </nav>
</header>

    <form class="appointment-form" id="appointmentForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Type Your Name" required>
    
        <label for="contact">Contact Information</label>
        <input type="text" id="contact" name="contact" placeholder="Phone Number/Email" required>
    
        <label for="datebirth">Date of Birth</label>
        <input type="date" id="datebirth" name="datebirth" required>
    
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
            <option value="">-- Select Gender --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
    
        <label for="medical">Medical History</label>
        <input type="text" id="medical" name="medical" placeholder="Optional">
    
        <label for="preferdate">Preferred Appointment Date</label>
        <input type="date" id="preferdate" name="preferdate" required>
    
        <label for="prefertime">Preferred Appointment Time</label>
        <input type="time" id="prefertime" name="prefertime" required>
    
        <label for="type">Appointment Type</label>
        <select id="type" name="type" required>
            <option value="">-- Select Type of Appointment --</option>
            <option value="consultation">Consultation</option>
            <option value="follow">Follow-Up</option>
            <option value="emergency">Emergency</option>
            <option value="other">Other (please specify)</option>
        </select>
    
        <label for="reason">Reason for Appointment</label>
        <input type="text" id="reason" name="reason" required>
    
        <button type="button" id="previewBtn">Preview</button>
        

            <!-- Summary Section (Hidden by Default) -->
        <div id="summary" style="display: none; border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
            <h3>Appointment Summary</h3>
            <p><strong>Name:</strong> <span id="summaryname"></span></p>
            <p><strong>Contact:</strong> <span id="summarycontact"></span></p>
            <p><strong>Date of Birth:</strong> <span id="summarydatebirth"></span></p>
            <p><strong>Gender:</strong> <span id="summarygender"></span></p>
            <p><strong>Medical History:</strong> <span id="summarymedical"></span></p>
            <p><strong>Preferred Date:</strong> <span id="summarypreferdate"></span></p>
            <p><strong>Preferred Time:</strong> <span id="summaryprefertime"></span></p>
            <p><strong>Appointment Type:</strong> <span id="summarytype"></span></p>
            <p><strong>Reason:</strong> <span id="summaryreason"></span></p>
        </div>

        <button type="submit" id="confirmBtn">Submit Appointment</button>
    </form>

    
    
    
<script src="appointment.js"></script>    

</body>
</html>
