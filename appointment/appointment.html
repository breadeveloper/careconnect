<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect - Appointments</title>
    <link rel="stylesheet" href="appointment.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/index.html">
                <img src="CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../registration/registration.html">Login</a></li>
                <li><a href="../clinics/clinics.html">Clinics</a></li>
                <li><a href="../appointment/appointment.html" class="active">Appointment</a></li>
                <li><a href="../about/about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-container">
        
        <div class="calendar-card">
            <div id="calendar"></div>
        </div>

        <div class="dashboard-controls">
            <div class="search-filter-group">
                <input type="text" id="appointment-search" placeholder="Search clinic or doctor...">
                <select id="appointment-status-filter">
                    <option value="all">All Statuses</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="pending">Pending</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            
            <div class="action-group">
                <div id="clinic-bulk-actions" class="hidden">
                    <button class="btn success-btn" id="bulk-approve">Approve</button>
                    <button class="btn danger-btn" id="bulk-cancel">Cancel</button>
                </div>
                
                <button id="new-appointment-btn" class="btn primary-btn">+ New Appointment</button>
            </div>
        </div>

        <div class="table-card">
            <table class="appointment-table">
                <thead>
                    <tr>
                        <th class="checkbox-col hidden"><input type="checkbox" id="select-all"></th>
                        <th>Date & Time</th>
                        <th>Clinic Name</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="appointment-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 20px;">Loading appointments...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Book an Appointment</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="booking-form">
                <div class="form-group">
                    <label>Select Clinic</label>
                    <select id="modal-clinic-select" required>
                        <option value="">Choose a clinic...</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>Reason for Visit</label>
                    <input type="text" id="modal-reason" placeholder="e.g., Checkup, Dental Cleaning" required>
                </div>
                <div class="form-group">
                    <label>Preferred Date</label>
                    <input type="date" id="modal-date" required>
                </div>
                <div class="form-group">
                    <label>Preferred Time</label>
                    <input type="time" id="modal-time" required>
                </div>
                <button type="submit" class="btn primary-btn full-width">Submit Request</button>
            </form>
        </div>
    </div>

    <script src="appointment.js"></script>
</body>
</html>
