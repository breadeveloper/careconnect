<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - CareConnect</title>
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/index.html">
                <img src="CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../registration/registration.html" id="login-nav-link">Login</a></li>
                <li><a href="../clinics/clinics.html">Clinics</a></li>
                <li><a href="../appointment/appointment.html">Appointment</a></li>
                <li><a href="../about/about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <h2>Patient Profile Settings</h2>
            <p>View or update your personal information, location, and medical history.</p>
        </div>

        <div class="profile-card">
            <form id="profile-form" class="view-mode">
                
                <div class="form-section">
                    <h3>Personal Identity</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="full_name" class="always-locked" readonly placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="email" class="always-locked" readonly placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Date of Birth</label>
                            <input type="date" id="dob" class="always-locked" readonly>
                        </div>
                        <div class="input-group">
                            <label>Sex</label>
                            <input type="text" id="sex" class="always-locked" readonly placeholder="Loading...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Contact & Location</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Contact Number</label>
                            <input type="text" id="contact_number" name="contact_number" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Province</label>
                            <input type="text" id="province" name="province" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Town</label>
                            <input type="text" id="town" name="town" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Barangay</label>
                            <input type="text" id="barangay" name="barangay" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group full-width">
                            <label>Street / House Number</label>
                            <input type="text" id="street" name="street" class="editable-field" required placeholder="Loading...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Pre-existing Medical Conditions</h3>
                    <div class="medical-history-container form-group full-width">
                        <label class="main-toggle">
                            <input type="checkbox" id="has-medical-history" class="editable-field"> I have a pre-existing medical condition
                        </label>

                        <div id="medical-details" class="medical-details hidden">
                            <div class="medical-controls hide-in-view">
                                <input type="text" id="med-search" placeholder="Search conditions...">
                                <select id="med-filter">
                                    <option value="all">All Categories</option>
                                    <option value="cardio">Cardiovascular</option>
                                    <option value="respiratory">Respiratory</option>
                                    <option value="metabolic">Metabolic</option>
                                </select>
                            </div>

                            <div class="medical-options" id="medical-options-list">
                                <label class="med-option" data-category="cardio"><input type="checkbox" name="medical_history[]" value="Heart Disease" class="editable-field"> Heart Disease</label>
                                <label class="med-option" data-category="cardio"><input type="checkbox" name="medical_history[]" value="Hypertension" class="editable-field"> Hypertension</label>
                                <label class="med-option" data-category="respiratory"><input type="checkbox" name="medical_history[]" value="Asthma" class="editable-field"> Asthma</label>
                                <label class="med-option" data-category="respiratory"><input type="checkbox" name="medical_history[]" value="COPD" class="editable-field"> COPD</label>
                                <label class="med-option" data-category="metabolic"><input type="checkbox" name="medical_history[]" value="Diabetes Type 1" class="editable-field"> Diabetes Type 1</label>
                                <label class="med-option" data-category="metabolic"><input type="checkbox" name="medical_history[]" value="Diabetes Type 2" class="editable-field"> Diabetes Type 2</label>
                                <label class="med-option" data-category="all"><input type="checkbox" id="other-med-checkbox" value="Other" class="editable-field"> Other (Please specify)</label>
                            </div>

                            <div id="other-med-input-container" class="hidden" style="margin-top: 15px;">
                                <div id="dynamic-other-list"></div>
                                <button type="button" id="add-other-med-btn" class="secondary-btn hide-in-view">+ Add Another Condition</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-edit" class="btn-primary">Edit Profile</button>
                    <button type="button" id="btn-back" class="btn-cancel" onclick="window.location.href='../home/index.html'">Back</button>
                    
                    <button type="submit" id="btn-save" class="btn-save hidden">Save Changes</button>
                    <button type="button" id="btn-cancel-edit" class="btn-cancel hidden">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script src="profile.js"></script>
    <script src="../home/auth.js"></script>
</body>
</html>
