<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Profile - CareConnect Admin</title>
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/index.html">
                <img src="../home/CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../registration/registration.html" id="login-nav-link">Login</a></li>
                <li><a href="../clinics/clinics.html">Clinics</a></li>
                <li><a href="../appointment/appointment.html">Appointment</a></li>
                <li><a href="../about/about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <h2>Clinic Administration</h2>
            <p>Manage your facility details and operational schedule.</p>
        </div>

        <div class="profile-card">
            <form id="profile-form" class="view-mode" style="padding-top: 30px;">
                
                <div class="form-section">
                    <h3>Facility Identity</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Clinic Name</label>
                            <input type="text" id="clinic_name" class="always-locked" readonly placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Admin Email</label>
                            <input type="email" id="clinic_email" class="always-locked" readonly placeholder="Loading...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Contact & Location (Daet, Camarines Norte)</h3>
                    <div class="input-grid">
                        <div class="input-group full-width">
                            <label>Contact Number</label>
                            <input type="text" id="clinic_contact" name="clinic_contact" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Barangay</label>
                            <input type="text" id="barangay" name="barangay" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Street / Building Number</label>
                            <input type="text" id="street" name="street" class="editable-field" required placeholder="Loading...">
                        </div>
                        <div class="input-group">
                            <label>Latitude (Coordinates)</label>
                            <input type="text" id="latitude" name="latitude" class="editable-field" placeholder="e.g., 14.1167">
                        </div>
                        <div class="input-group">
                            <label>Longitude (Coordinates)</label>
                            <input type="text" id="longitude" name="longitude" class="editable-field" placeholder="e.g., 122.9500">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Operational Schedule</h3>
                    <p class="section-desc">Check the days your facility is open and specify the hours.</p>
                    
                    <div id="custom-schedule-container">
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Monday" class="editable-field custom-day-cb"> Monday</label>
                            <div class="time-inputs">
                                <input type="time" name="mon_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="mon_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Tuesday" class="editable-field custom-day-cb"> Tuesday</label>
                            <div class="time-inputs">
                                <input type="time" name="tue_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="tue_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Wednesday" class="editable-field custom-day-cb"> Wednesday</label>
                            <div class="time-inputs">
                                <input type="time" name="wed_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="wed_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Thursday" class="editable-field custom-day-cb"> Thursday</label>
                            <div class="time-inputs">
                                <input type="time" name="thu_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="thu_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Friday" class="editable-field custom-day-cb"> Friday</label>
                            <div class="time-inputs">
                                <input type="time" name="fri_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="fri_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Saturday" class="editable-field custom-day-cb"> Saturday</label>
                            <div class="time-inputs">
                                <input type="time" name="sat_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="sat_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                        <div class="custom-day-row">
                            <label class="checkbox-item"><input type="checkbox" name="custom_days[]" value="Sunday" class="editable-field custom-day-cb"> Sunday</label>
                            <div class="time-inputs">
                                <input type="time" name="sun_open" class="editable-field custom-time" disabled required> <span>to</span> <input type="time" name="sun_close" class="editable-field custom-time" disabled required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-edit" class="btn-primary">Edit Profile</button>
                    <button type="button" id="btn-back" class="btn-cancel" onclick="window.location.href='../home/index.html'">Back</button>
                    
                    <button type="submit" id="btn-save" class="btn-save hidden">Save Changes</button>
                    <button type="button" id="btn-cancel-edit" class="btn-cancel hidden">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script src="profile.js"></script>
    <script src="../home/auth.js"></script> 
</body>
</html>
