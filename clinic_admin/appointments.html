<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - CareConnect Admin</title>
    <link rel="stylesheet" href="appointments.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/index.html">
                <img src="../home/CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../registration/registration.html" id="login-nav-link">Login</a></li>
                <li><a href="../clinics/clinics.html">Clinics</a></li>
                <li><a href="../appointment/appointment.html">Appointment</a></li>
                <li><a href="../about/about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h2>Patient Appointments</h2>
            <p>Manage patient requests, approvals, and rescheduling.</p>
        </div>

        <div class="dashboard-controls">
            <input type="text" id="search-bar" placeholder="Search by patient name or reason...">
            <select id="status-filter">
                <option value="all">All Statuses</option>
                <option value="pending" selected>Pending Requests</option>
                <option value="confirmed">Confirmed</option>
                <option value="cancelled">Cancelled</option>
            </select>
            
            <div class="bulk-actions">
                <button id="bulk-approve" class="btn-sm btn-approve" disabled>Approve</button>
                <button id="bulk-reject" class="btn-sm btn-reject" disabled>Reject</button>
                <button id="bulk-delete" class="btn-sm btn-delete" disabled title="Delete Selected">Delete</button>
            </div>
        </div>

        <div class="table-card">
            <table class="appointment-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">
                            <input type="checkbox" id="select-all" title="Select All">
                        </th>
                        <th>Patient Details</th>
                        <th>Requested Date & Time</th>
                        <th>Reason for Visit</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="appointment-table-body">
                    <tr>
                        <td colspan="5" class="loading-text">Loading patient appointments...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="reschedule-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reschedule Appointment</h3>
                <span class="close-modal" id="close-reschedule">&times;</span>
            </div>
            <form id="reschedule-form">
                <input type="hidden" id="reschedule-appt-id">
                <div class="input-group">
                    <label>New Date</label>
                    <input type="date" id="new-date" required>
                </div>
                <div class="input-group">
                    <label>New Time</label>
                    <input type="time" id="new-time" required>
                </div>
                <button type="submit" class="btn-primary full-width" style="margin-top: 15px;">Confirm Reschedule</button>
            </form>
        </div>
    </div>

    <script src="appointments.js"></script>
    <script src="../home/auth.js"></script> 
</body>
</html>
