<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="clinics.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <title>CareConnect - Clinic Directory</title>
</head>
<body>
    <header>
        <div class="logo">
            <a href="../home/index.html">
                <img src="CareConnectLogo.png" alt="CareConnect Logo" class="logo-img">
            </a>
        </div>
        
        <nav>
            <ul>
                <li><a href="../registration/registration.html" id="login-nav-link">Login</a></li>
                <li><a href="../clinics/clinics.html">Clinics</a></li>
                <li><a href="../appointment/appointment.html">Appointment</a></li>
                <li><a href="../about/about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="directory-container">
        
        <div id="clinic-map" class="clinic-map-container"></div>

        <div class="directory-controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search clinics, doctors, or keywords...">
            </div>
            <div class="filter-group">
                <select id="filter-specialty">
                    <option value="all">All Specialties</option>
                    </select>
                <select id="filter-status">
                    <option value="all">Any Status</option>
                    <option value="open">Open Now</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
        </div>

        <div class="clinics-grid" id="clinics-grid">
            </div>
        
    </main>

    <script src="clinics.js"></script>
    <script src="../home/auth.js"></script>
</body>
</html>
